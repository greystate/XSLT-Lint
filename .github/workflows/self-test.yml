on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
    - main

jobs:
  test_file:
    runs-on: macos-latest
    name: Run XSLT Lint on itself
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - id: xsltlint-self-test
        uses: ./
        with:
          xslt-file: 'XSLTLint.xslt'
